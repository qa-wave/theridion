<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Theridion">
  <!-- Background: rounded square so it looks at home as a macOS icon. -->
  <rect width="256" height="256" rx="56" fill="#0f0f10"/>

  <!-- Tangleweb mesh: irregular silk threads radiating from the spider. -->
  <g stroke="#3f3f46" stroke-width="1.2" stroke-linecap="round" fill="none">
    <line x1="36" y1="40"  x2="128" y2="128"/>
    <line x1="220" y1="40" x2="128" y2="128"/>
    <line x1="36" y1="216" x2="128" y2="128"/>
    <line x1="220" y1="216" x2="128" y2="128"/>
    <line x1="128" y1="32"  x2="128" y2="128"/>
    <line x1="32"  y1="128" x2="128" y2="128"/>
    <line x1="224" y1="128" x2="128" y2="128"/>
    <line x1="128" y1="224" x2="128" y2="128"/>
    <line x1="36" y1="40"   x2="220" y2="80"/>
    <line x1="220" y1="40"  x2="32"  y2="100"/>
    <line x1="32" y1="128"  x2="224" y2="160"/>
    <line x1="44" y1="200"  x2="212" y2="56"/>
    <line x1="68" y1="32"   x2="188" y2="224"/>
    <line x1="36" y1="80"   x2="224" y2="120"/>
  </g>

  <!-- Spider: polygonal body + 8 articulated legs in two tiers (emerald accent). -->
  <g fill="#10b981" stroke="#10b981" stroke-linejoin="miter" stroke-linecap="round">
    <!-- Cephalothorax (front segment) -->
    <ellipse cx="128" cy="115" rx="14" ry="11"/>
    <!-- Abdomen (rear segment) -->
    <polygon points="128,128 144,140 128,158 112,140"/>
  </g>

  <!-- Legs: each leg is a knee-bent two-segment path. -->
  <g fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left side -->
    <polyline points="116,108 96,98 80,108"/>
    <polyline points="114,118 90,118 76,128"/>
    <polyline points="116,128 92,138 80,150"/>
    <polyline points="118,140 104,156 96,172"/>
    <!-- Right side (mirrored) -->
    <polyline points="140,108 160,98  176,108"/>
    <polyline points="142,118 166,118 180,128"/>
    <polyline points="140,128 164,138 176,150"/>
    <polyline points="138,140 152,156 160,172"/>
  </g>

  <!-- Single highlight dot on cephalothorax for visual focus. -->
  <circle cx="124" cy="111" r="2" fill="#0f0f10"/>
</svg>
