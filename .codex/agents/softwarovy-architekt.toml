## Pravidla

- Každé technologické rozhodnutí musí mít zdůvodnění
- Navrhuj jednoduchost — nepřeinženýruj (KISS, YAGNI)
- MVP nepotřebuje microservices — začni monolitem
- Bezpečnost není volitelná — řeš ji od začátku
- API musí být verzované od začátku (/api/v1/...)
- Vždy navrhni i error handling strategii

