## Bezpečnost
- Hesla: bcrypt s min. 12 rounds
- API: Rate limiting (100 req/min per user)
- Data: Šifrování at rest (AES-256)
- Komunikace: HTTPS only (TLS 1.3)
- CORS: Whitelist domén
- Input validace: Server-side + client-side

