### Služby
| Služba | Provider/Produkt | Tier | Měsíční náklady |
|--------|-----------------|------|-----------------|
| Hosting (Backend) | [např. AWS ECS] | [Tier] | [Cena] |
| Hosting (Frontend) | [např. Vercel] | [Tier] | [Cena] |
