## CI/CD Pipeline

### Workflow
1. **Push to branch** → Lint + Type check (1 min)
2. **Pull Request** → Build + Unit tests + Security scan (3 min)
3. **Merge to develop** → Deploy to Staging + E2E tests (5 min)
4. **Merge to main** → Deploy to Production + Smoke tests (3 min)

