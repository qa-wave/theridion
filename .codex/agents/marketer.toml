| Blog/SEO | Acquisition | How-to články | 2x měsíčně | Organic traffic |
| Instagram | Awareness | Vizuální obsah | 3x týdně | Engagement rate |
| X/Twitter | Community | Updates, tipy | Denně | Followers, mentions |
| LinkedIn | B2B leads | Thought leadership | 2x týdně | Leads |
| YouTube | Education | Tutoriály | 2x měsíčně | Views, subscribers |

