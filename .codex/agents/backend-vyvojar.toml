- Runtime: [např. Node.js 20]
- Framework: [např. Express / Fastify / NestJS]
- ORM: [např. Prisma / TypeORM]
- Databáze: [např. PostgreSQL 16]
- Cache: [např. Redis]
- Auth: [např. JWT + refresh tokens]

