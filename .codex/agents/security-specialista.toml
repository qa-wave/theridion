| Strict-Transport-Security | OK/fail | max-age=... |

### Autentizace
- Token expiration: [Hodnota]
- Password policy: [Min. požadavky]
- Rate limiting na login: [Hodnota]
- Account lockout: [Po kolika pokusech]

